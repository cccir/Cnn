
project:
  title:       "2x2 CNN Accelerator PE Grid with UART"
  author:      "kavi"
  discord:     ""
  description: "UART-controlled 2x2 systolic processing-element grid for CNN inference. Send 3-byte packets over UART to drive activations/weights; receive 2-byte psum results."
  language:    "SystemVerilog"
  clock_hz:    25000000

  tiles: "1x1"

  top_module: "tt_um_peg_top"

  source_files:
    - "pe_update.sv"
    - "peg_1x.sv"
    - "uart_peg_top.sv"
    - "tt_um_peg_top.sv"

